<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İki Faktörlü Doğrulama</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #111111;
            --card: #1a1a1a;
            --text-dim: #999999;
        }
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.6rem; margin: 0 0 0.5rem 0; font-weight: 600; }
        .sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }

        .flash {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: left;
        }
        .flash-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .flash-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-dim); }
        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1.8rem;
            letter-spacing: 0.5em;
            text-align: center;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }

        .btn-verify {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        .back-link { margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-dim); }
        .back-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>Doğrulama Kodu</h1>
        <p class="sub">Authenticator uygulamanızdaki 6 haneli kodu girin.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form action="{{ url_for('auth.totp_verify') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>6 Haneli Kod</label>
                <input type="text" name="code" maxlength="6" pattern="\d{6}" required
                       placeholder="000000" autocomplete="one-time-code" autofocus>
            </div>
            <button type="submit" class="btn-verify">Doğrula ve Giriş Yap</button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('auth.login') }}">← Farklı hesapla giriş yap</a>
        </div>
    </div>
</body>
</html>
